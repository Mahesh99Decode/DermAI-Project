<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DermAI - Doctor Login</title>
  
  <!-- Modern Typography and Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <style>
    :root {
      --primary: #10b981; /* Doctor theme gets the emerald color used in the dashboard */
      --primary-hover: #059669;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 100% 0%, hsla(160, 100%, 85%, 0.5) 0px, transparent 50%),
        radial-gradient(at 0% 100%, hsla(199, 100%, 85%, 0.3) 0px, transparent 50%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
    }

    /* Card */
    .login-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border: 1px solid rgba(255, 255, 255, 0.8);
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    
    .logo i {
      font-size: 2.5rem;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
      width: 72px;
      height: 72px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 18px;
      color: var(--primary);
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
    }

    /* Title */
    h2 {
      font-size: 1.5rem;
      color: var(--text-main);
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    /* Inputs */
    input {
      width: 100%;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      outline: none;
      font-family: inherit;
      font-size: 1rem;
      background: white;
      transition: var(--transition);
      box-sizing: border-box;
    }
    
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
    }

    /* Button */
    button {
      width: 100%;
      padding: 1.1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #059669);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    /* Register */
    p {
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }
    
    a:hover {
      text-decoration: underline;
      color: var(--primary-hover);
    }
  </style>
</head>
<body>

<div class="login-card">

  <div class="logo">
    <i class="fa-solid fa-leaf"></i>
    <span>DermAI <span style="font-size: 0.9em;">Pro</span></span>
  </div>

  <h2>Doctor Login</h2>

  <form onsubmit="handleLogin(event)">
    <input type="email" placeholder="Enter Doctor Medical ID / Email" required>
    <input type="password" placeholder="Enter Password" required>

    <button type="submit">Login as Doctor</button>
  </form>

  <p>
    Clinic not registered? <a href="#">Contact Sub-admin</a>
  </p>

</div>

<script src="../js/doctor_login.js"></script>
</body>
</html>
